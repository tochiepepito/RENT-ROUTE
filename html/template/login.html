<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0">
		<title>Rent & Route</title>
		
		<!-- Favicon -->
		<link rel="shortcut icon" href="assets/img/favicon.png">
		
		<!-- Bootstrap CSS -->
		<link rel="stylesheet" href="assets/css/bootstrap.min.css">

		<!-- Fontawesome CSS -->
		<link rel="stylesheet" href="assets/plugins/fontawesome/css/fontawesome.min.css">
		<link rel="stylesheet" href="assets/plugins/fontawesome/css/all.min.css">
		
		<!-- Fearther CSS -->
		<link rel="stylesheet" href="assets/css/feather.css">
		
		<!-- Main CSS -->
		<link rel="stylesheet" href="assets/css/style.css">
	</head>
	<body>
	
		<!-- Main Wrapper -->
		<div class="main-wrapper login-body">
			<!-- Header -->
			<header class="log-header">
				<a href="index.html"><img class="img-fluid logo-dark" src="assets/img/favicon.png" style="width: 20%; height: auto;" alt="Logo"></a>
			</header>
			<!-- /Header -->

			<div class="login-wrapper">
				<div class="loginbox">						
					<div class="login-auth">
						<div class="login-auth-wrap">
							<div class="sign-group">
								<a href="index.html" class="btn sign-up"><span><i class="fe feather-corner-down-left" aria-hidden="true"></i></span> Back To Home</a>
							</div>
							<h1>Sign In</h1>
							<p class="account-subtitle">Enter your credentials to login.</p>								
							<form action="../../backend/login.php" method="POST" id="loginForm">
								<div class="input-block">
									<label class="form-label">Email <span class="text-danger">*</span></label>
									<input type="email" class="form-control" name="email" placeholder="" required>
								</div>
								<div class="input-block">
									<label class="form-label">Password <span class="text-danger">*</span></label>
									<div class="pass-group">
										<input type="password" class="form-control pass-input" name="password" placeholder="" required>
										<span class="fas fa-eye-slash toggle-password"></span>
									</div>
								</div>								
								<div class="input-block">
									<a class="forgot-link" href="forgot-password.html">Forgot Password ₱</a>
								</div>
								<div class="input-block m-0">
									<label class="custom_check d-inline-flex"><span>Remember me</span>
										<input type="checkbox" name="remember">
										<span class="checkmark"></span>
									</label>
								</div>
								<button type="submit" class="btn btn-outline-light w-100 btn-size mt-1">Sign In</button>
								<div class="login-or">
									<span class="or-line"></span>
									<span class="span-or-log">Or, log in with your email</span>
								</div>
								<!-- Social Login -->
								<div class="social-login">
									<a href="#" class="d-flex align-items-center justify-content-center input-block btn google-login w-100"><span><img src="assets/img/icons/google.svg" class="img-fluid" alt="Google"></span>Log in with Google</a>
								</div>
								<div class="social-login">
									<a href="#" class="d-flex align-items-center justify-content-center input-block btn google-login w-100"><span><img src="assets/img/icons/facebook.svg" class="img-fluid" alt="Facebook"></span>Log in with Facebook</a>
								</div>
								<!-- /Social Login -->
								<div class="text-center dont-have">Don't have an account yet₱ <a href="register.html">Register</a></div>
							</form>							
						</div>
					</div>
				</div>
			</div>
			
			<!-- Footer -->
			<footer class="log-footer">				
				<div class="container-fluid">					
					<!-- Copyright -->
					<div class="copyright">
						<div class="copyright-text">
							<p>₱ 2024 Dreams Rent. All Rights Reserved.</p>
						</div>
					</div>
					<!-- /Copyright -->						
				</div>			
			</footer>
			<!-- /Footer -->
		</div>
		<!-- /Main Wrapper -->
		
		<!-- jQuery -->
		<script src="assets/js/jquery-3.7.1.min.js"></script>
		
		<!-- Bootstrap Core JS -->
		<script src="assets/js/bootstrap.bundle.min.js"></script>
		
		<!-- Custom JS -->
		<script src="assets/js/script.js"></script>

		<!-- Login Authentication Script -->
		<script>
			$(document).ready(function() {
				// Handle login form submission
				$('#loginForm').on('submit', function(e) {
					e.preventDefault();
					
					var formData = new FormData(this);
					var $form = $(this);
					var $submitBtn = $form.find('button[type="submit"]');
					
					// Disable submit button and show loading state
					$submitBtn.prop('disabled', true);
					var originalBtnText = $submitBtn.text();
					$submitBtn.text('Signing in...');
					
					$.ajax({
						url: '../../backend/login.php',
						type: 'POST',
						data: formData,
						dataType: 'json',
						processData: false,
						contentType: false,
						success: function(response) {
							if (response.success) {
								// Store user role and ID in sessionStorage for later use
								sessionStorage.setItem('userRole', response.user.role);
								sessionStorage.setItem('userId', response.user.user_id);
								sessionStorage.setItem('userName', response.user.username);
								
								// Redirect based on user role
								console.log('Login successful. Role:', response.user.role);
								console.log('Redirecting to:', response.redirect);
								
								// Show success message
								showNotification('Login successful!', 'success');
								
								// Redirect after a short delay
								setTimeout(function() {
									window.location.href = response.redirect;
								}, 500);
							}
						},
						error: function(xhr) {
							// Re-enable submit button
							$submitBtn.prop('disabled', false);
							$submitBtn.text(originalBtnText);
							
							try {
								var response = JSON.parse(xhr.responseText);
								showNotification(response.error || 'Login failed. Please try again.', 'error');
							} catch(e) {
								showNotification('An error occurred during login. Please try again.', 'error');
							}
						}
					});
				});
				
				// Function to display notifications
				function showNotification(message, type) {
					var alertClass = type === 'success' ₱ 'alert-success' : 'alert-danger';
					var alertHtml = '<div class="alert ' + alertClass + ' alert-dismissible fade show" role="alert">' +
						message +
						'<button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>' +
						'</div>';
					
					// Insert alert at the top of the login form
					$('#loginForm').before(alertHtml);
					
					// Auto-dismiss success alerts after 3 seconds
					if (type === 'success') {
						setTimeout(function() {
							$('.alert').fadeOut(function() {
								$(this).remove();
							});
						}, 3000);
					}
				}
				
				// Password visibility toggle
				$('.toggle-password').on('click', function() {
					var $passwordInput = $(this).siblings('.pass-input');
					var currentType = $passwordInput.attr('type');
					
					if (currentType === 'password') {
						$passwordInput.attr('type', 'text');
						$(this).removeClass('fa-eye-slash').addClass('fa-eye');
					} else {
						$passwordInput.attr('type', 'password');
						$(this).removeClass('fa-eye').addClass('fa-eye-slash');
					}
				});
			});
		</script>

	</body>
</html>
