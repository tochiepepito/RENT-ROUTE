	<body>

				<a href="index.html"><img class="img-fluid logo-dark" src="assets/img/favicon.png" style="width: 20%; height: auto;" alt="Logo"></a>

			<div class="login-wrapper">

								<a href="index.html" class="btn sign-up"><span><i class="fe feather-corner-down-left" aria-hidden="true"></i></span> Back To Home</a>
							</div>
							<h1>Sign Up</h1>
							<p class="account-subtitle">We'll send a confirmation code to your email.</p>								
							<form action="../../backend/register.php" method="POST">
								<div class="input-block">
									<label class="form-label">Select Role <span class="text-danger">*</span></label>
									<select class="form-control" name="role" id="roleSelect" required>

										<option value="renter">Renter</option>

									</select>
								</div>

									<label class="form-label">Username <span class="text-danger">*</span></label>
									<input type="text" class="form-control" name="username" placeholder="" required>
								</div>
								<div class="input-block">
									<label class="form-label">Email <span class="text-danger">*</span></label>
									<input type="email" class="form-control" name="email" placeholder="" required>

									<label class="form-label">Password <span class="text-danger">*</span></label>

								<div class="login-or">

									<span class="span-or">Or, Create an account with your email</span>
								</div>
								<!-- Social Login -->
								<div class="social-login">
									<a href="#" class="d-flex align-items-center justify-content-center input-block btn google-login w-100"><span><img src="assets/img/icons/google.svg" class="img-fluid" alt="Google"></span>Log in with Google</a>
								</div>
								<div class="social-login">
									<a href="#" class="d-flex align-items-center justify-content-center input-block btn google-login w-100"><span><img src="assets/img/icons/facebook.svg" class="img-fluid" alt="Facebook"></span>Log in with Facebook</a>
								</div>

						</div>

		<!-- jQuery -->
		<script src="assets/js/jquery-3.7.1.min.js"></script>

		<!-- Custom JS -->
		<script src="assets/js/script.js"></script>

		<!-- Registration Form Script -->
		<script>
			$(document).ready(function() {
				// Handle registration form submission
				$('form[action="../../backend/register.php"]').on('submit', function(e) {
					e.preventDefault();
					
					var formData = new FormData(this);
					var $form = $(this);
					var $submitBtn = $form.find('button[type="submit"]');
					
					// Validate role selection
					var selectedRole = $form.find('select[name="role"]').val();
					if (!selectedRole) {
						showNotification('Please select a role (Renter or Car Owner)', 'error');
						return;
					}
					
					// Disable submit button and show loading state
					$submitBtn.prop('disabled', true);
					var originalBtnText = $submitBtn.text();
					$submitBtn.text('Creating account...');
					
					$.ajax({
						url: '../../backend/register.php',
						type: 'POST',
						data: formData,
						dataType: 'json',
						processData: false,
						contentType: false,
						success: function(response) {
							if (response.success) {
								// Show success message
								showNotification('Account created successfully! Redirecting to login...', 'success');
								
								// Redirect to login after a short delay
								setTimeout(function() {
									window.location.href = 'login.html';
								}, 2000);
							}
						},
						error: function(xhr) {
							// Re-enable submit button
							$submitBtn.prop('disabled', false);
							$submitBtn.text(originalBtnText);
							
							try {
								var response = JSON.parse(xhr.responseText);
								showNotification(response.error || 'Registration failed. Please try again.', 'error');
							} catch(e) {
								showNotification('An error occurred during registration. Please try again.', 'error');
							}
						}
					});
				});
				
				// Function to display notifications
				function showNotification(message, type) {
					var alertClass = type === 'success' ₱ 'alert-success' : 'alert-danger';
					var alertHtml = '<div class="alert ' + alertClass + ' alert-dismissible fade show" role="alert">' +
						message +
						'<button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>' +
						'</div>';
					
					// Insert alert at the top of the form
					$('form[action="../../backend/register.php"]').before(alertHtml);
					
					// Auto-dismiss success alerts after 3 seconds
					if (type === 'success') {
						setTimeout(function() {
							$('.alert').fadeOut(function() {
								$(this).remove();
							});
						}, 3000);
					}
				}
				
				// Password visibility toggle
				$('.toggle-password').on('click', function() {
					var $passwordInput = $(this).siblings('.pass-input');
					var currentType = $passwordInput.attr('type');
					
					if (currentType === 'password') {
						$passwordInput.attr('type', 'text');
						$(this).removeClass('fa-eye-slash').addClass('fa-eye');
					} else {
						$passwordInput.attr('type', 'password');
						$(this).removeClass('fa-eye').addClass('fa-eye-slash');
					}
				});
			});
		</script>

	</body>
</html>
